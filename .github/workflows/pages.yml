name: Pages

# Versioned deploy of the Leptos landing page to the `gh-pages` branch:
#   - push to main            -> rebuilds /dev/   (unreleased preview)
#   - workflow_dispatch+input -> builds /v<version>/ from CURRENT source
#                                (bootstrap of /v0.14.0/, and each release: a
#                                release runs `gh workflow run pages.yml -f
#                                version=X.Y.Z` from the tag — see release docs)
# Each run regenerates /versions.json (the dropdown manifest) + the root
# redirect to the latest release. Deploys only if the playwright-rs dogfood
# test passes against the built output. The site crates are excluded from the
# root workspace, so this is the only workflow that builds/tests them.
#
# One-time setup after the first run: Settings -> Pages -> Build and deployment
# -> Source: "Deploy from a branch" -> Branch: gh-pages / (root).

on:
  push:
    branches: [main]
    paths:
      - "crates/site/**"
      - "crates/site-e2e/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:
    inputs:
      version:
        description: "Publish current source as /v<version>/ (e.g. 0.14.0). Blank = normal /dev/ build."
        required: false
        default: ""

permissions:
  contents: write # push to gh-pages

# One deploy at a time; don't cancel an in-progress deploy.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    name: Build, dogfood-gate, and deploy
    runs-on: ubuntu-latest
    env:
      PLAYWRIGHT_DRIVER_CACHE_DIR: ${{ github.workspace }}/.playwright-driver
    steps:
      - uses: actions/checkout@v7

      - name: Determine target snapshot
        id: target
        run: |
          ver="${{ github.event.inputs.version }}"
          if [ -n "$ver" ]; then
            echo "site_version=$ver" >> "$GITHUB_OUTPUT"
            echo "dest=v$ver" >> "$GITHUB_OUTPUT"
          else
            echo "site_version=dev" >> "$GITHUB_OUTPUT"
            echo "dest=dev" >> "$GITHUB_OUTPUT"
          fi

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
          targets: wasm32-unknown-unknown

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            crates/site
            crates/site-e2e

      - name: Install Trunk
        uses: taiki-e/install-action@v2
        with:
          tool: trunk

      - name: Cache Playwright driver
        uses: actions/cache@v6
        with:
          path: ${{ github.workspace }}/.playwright-driver
          key: ${{ runner.os }}-pw-driver-1.61.0

      - name: Cache Playwright browsers
        uses: actions/cache@v6
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-browsers-1.61.0-v2
          restore-keys: ${{ runner.os }}-playwright-browsers-1.61.0-

      - name: Format + lint site crates
        run: |
          cargo fmt --manifest-path crates/site/Cargo.toml -- --check
          cargo fmt --manifest-path crates/site-e2e/Cargo.toml -- --check
          cargo clippy --manifest-path crates/site/Cargo.toml --target wasm32-unknown-unknown --all-targets -- -D warnings
          cargo clippy --manifest-path crates/site-e2e/Cargo.toml --all-targets -- -D warnings

      # Dogfood gate: a canonical root-served dev build the binding can drive.
      # SITE_VERSION=dev so the switcher's dev-banner assertion holds; public-url
      # stays "/" so the e2e server (serving dist at root) resolves assets.
      - name: Build site for dogfood gate
        run: cd crates/site && SITE_VERSION=dev trunk build --release

      - name: Install Chromium
        run: cargo run --release -p playwright-rs --bin playwright-rs --features cli -- install chromium --with-deps

      - name: Dogfood test (deploy gate)
        run: cargo test --manifest-path crates/site-e2e/Cargo.toml

      # Build the actual snapshot for the target subpath. Assets resolve under
      # /<dest>/; SITE_VERSION labels the build for the switcher + banner.
      - name: Build snapshot for ${{ steps.target.outputs.dest }}
        run: |
          cd crates/site
          SITE_VERSION="${{ steps.target.outputs.site_version }}" \
            trunk build --release --public-url "/${{ steps.target.outputs.dest }}/" --dist dist-snapshot
          rm -rf dist-snapshot/receipts
          cp -r public/receipts dist-snapshot/receipts || true

      - name: Check out gh-pages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git ls-remote --exit-code --heads origin gh-pages >/dev/null 2>&1; then
            git fetch origin gh-pages
            # -B puts the worktree on a local gh-pages branch (not detached HEAD)
            # reset to the remote, so the commit/push below has a ref to push.
            git worktree add -B gh-pages gh origin/gh-pages
          else
            # First run: create the branch off HEAD, then clear inherited files
            # so gh-pages holds only deployed site content.
            git worktree add -b gh-pages gh
            (cd gh && git rm -rqf . >/dev/null 2>&1 || true)
          fi

      - name: Assemble snapshot + manifest
        run: |
          dest="${{ steps.target.outputs.dest }}"
          rm -rf "gh/$dest"
          mkdir -p "gh/$dest"
          cp -r crates/site/dist-snapshot/. "gh/$dest/"
          bash crates/site/deploy/update-manifest.sh gh
          echo "playwright-rust.dev" > gh/CNAME
          touch gh/.nojekyll

      - name: Commit + push gh-pages
        run: |
          cd gh
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to publish."
          else
            git commit -m "Deploy ${{ steps.target.outputs.dest }} (${{ github.sha }})"
            git push origin HEAD:gh-pages
          fi
