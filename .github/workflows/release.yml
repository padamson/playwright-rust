name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

permissions:
  contents: write

jobs:
  test:
    name: Test ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux x86_64
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu

          # macOS x86_64 (Intel)
          - os: macos-latest
            target: x86_64-apple-darwin

          # macOS aarch64 (Apple Silicon)
          - os: macos-latest
            target: aarch64-apple-darwin

          # Windows x86_64
          - os: windows-latest
            target: x86_64-pc-windows-msvc

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
          target: ${{ matrix.target }}

      - name: Cache Cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Cache Playwright Drivers
        uses: actions/cache@v5
        with:
          path: drivers/
          key: ${{ runner.os }}-playwright-drivers-1.59.1

      - name: Cache Playwright Browsers (Linux/macOS)
        if: runner.os != 'Windows'
        uses: actions/cache@v5
        with:
          path: |
            ~/.cache/ms-playwright
            ~/Library/Caches/ms-playwright
          key: ${{ runner.os }}-playwright-browsers-1.59.1-v2
          restore-keys: |
            ${{ runner.os }}-playwright-browsers-1.59.1-

      - name: Cache Playwright Browsers (Windows)
        if: runner.os == 'Windows'
        uses: actions/cache@v5
        with:
          path: ~\AppData\Local\ms-playwright
          key: ${{ runner.os }}-playwright-browsers-1.59.1-v2
          restore-keys: |
            ${{ runner.os }}-playwright-browsers-1.59.1-

      - name: Install cargo-nextest
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest

      - name: Build
        run: cargo build --verbose

      - name: Install Playwright browsers (Linux)
        if: runner.os == 'Linux'
        run: drivers/playwright-1.59.1-linux/node drivers/playwright-1.59.1-linux/package/cli.js install chromium firefox webkit --with-deps

      - name: Install Playwright browsers (macOS)
        if: runner.os == 'macOS'
        run: |
          if [ -d "drivers/playwright-1.59.1-mac-arm64" ]; then
            drivers/playwright-1.59.1-mac-arm64/node drivers/playwright-1.59.1-mac-arm64/package/cli.js install chromium firefox webkit
          else
            drivers/playwright-1.59.1-mac/node drivers/playwright-1.59.1-mac/package/cli.js install chromium firefox webkit
          fi

      - name: Install Playwright browsers (Windows)
        if: runner.os == 'Windows'
        run: drivers\playwright-1.59.1-win32_x64\node.exe drivers\playwright-1.59.1-win32_x64\package\cli.js install chromium firefox webkit

      - name: Run tests
        run: cargo nextest run --workspace --profile ci --target ${{ matrix.target }}

  create-release:
    name: Create GitHub Release
    needs: [test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Get version from tag
        id: get_version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Install parse-changelog
        uses: taiki-e/install-action@v2
        with:
          tool: parse-changelog

      - name: Generate Release Notes
        run: parse-changelog CHANGELOG.md ${{ steps.get_version.outputs.version }} > release_notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          body_path: release_notes.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-crates:
    name: Publish to crates.io
    needs: [test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable

      - name: Check if token is set
        id: check_token
        run: |
          if [ -z "${{ secrets.CARGO_REGISTRY_TOKEN }}" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "⚠️ CARGO_REGISTRY_TOKEN not set, skipping crates.io publishing"
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Publish playwright-rs
        if: steps.check_token.outputs.skip == 'false'
        run: cargo publish -p playwright-rs
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        continue-on-error: true
