name: Upstream Playwright Check

# Polls microsoft/playwright for new releases and opens a tracking issue
# when our bundled driver version is behind upstream. Issue-only — does
# not auto-bump because driver bumps can carry browser-binary changes,
# protocol-schema deltas, or platform-support drops (e.g. macOS 14
# WebKit removal in 1.59) that need human review.
#
# Also probes the driver-assembly download URLs (npm playwright-core +
# the pinned Node binary for all six platforms) on the same cadence.
# Upstream URL breakage arrives with zero change on our side — the
# azureedge CDN shutdown broke fresh builds for weeks before a report
# surfaced — so a scheduled probe, not a code-triggered job, is the
# guard that actually fires.

on:
  schedule:
    # Saturday 10:00 UTC — runs after the Dependabot Cargo PR window
    # (04:00 ET = 09:00 UTC) so we batch maintenance tasks together.
    - cron: '0 10 * * 6'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  check-upstream:
    name: Check microsoft/playwright for new release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Read currently bundled driver version
        id: current
        run: |
          # pipefail: without it a grep miss (constant renamed/removed) still
          # exits 0 through sed, yielding an empty version that reads as "behind"
          # and opens a bogus tracking issue.
          set -euo pipefail
          version=$(grep -E 'const PLAYWRIGHT_VERSION:' crates/playwright/build.rs | sed -E 's/.*"([^"]+)".*/\1/')
          if [ -z "$version" ]; then
            echo "::error::could not read PLAYWRIGHT_VERSION from crates/playwright/build.rs"
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "Bundled driver version: $version"

      - name: Fetch latest microsoft/playwright release
        id: upstream
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          # Latest non-prerelease tag; strip leading "v" to compare against build.rs
          latest=$(gh release view --repo microsoft/playwright --json tagName --jq '.tagName' | sed -E 's/^v//')
          if [ -z "$latest" ]; then
            echo "::error::could not read the latest microsoft/playwright release tag"
            exit 1
          fi
          echo "version=$latest" >> "$GITHUB_OUTPUT"
          echo "Latest upstream release: $latest"

      - name: Open / update tracking issue if behind
        if: steps.current.outputs.version != steps.upstream.outputs.version
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CURRENT: ${{ steps.current.outputs.version }}
          UPSTREAM: ${{ steps.upstream.outputs.version }}
        run: |
          set -euo pipefail

          title="Driver bump: Playwright ${UPSTREAM} available (we ship ${CURRENT})"

          # Idempotent: if an open issue already tracks this exact upstream
          # version, skip. Match on title to avoid spamming weekly.
          existing=$(gh issue list --label upstream-playwright-bump \
            --state open --search "in:title ${UPSTREAM}" \
            --json number,title \
            --jq '.[] | select(.title == "'"${title}"'") | .number' | head -n1)

          if [ -n "${existing}" ]; then
            echo "Open issue #${existing} already tracks ${UPSTREAM} — skipping."
            exit 0
          fi

          # Ensure the label exists (idempotent — ignore failure if it does)
          gh label create upstream-playwright-bump \
            --description "Tracking issues for upstream Playwright driver version bumps" \
            --color "1d76db" 2>/dev/null || true

          # Render the body to a file to avoid YAML/shell quoting issues
          cat > /tmp/issue-body.md <<EOF
          Microsoft Playwright **${UPSTREAM}** is the current upstream release; this repo bundles **${CURRENT}** via \`crates/playwright/build.rs\`.

          ## What changes when bumping

          - \`crates/playwright/build.rs\` — \`PLAYWRIGHT_VERSION\` constant
          - \`README.md\` — install snippet (\`npx playwright@VERSION install\`) and version badge
          - \`crates/playwright/src/lib.rs\` — rustdoc reference if it pins a specific version
          - \`.github/workflows/test.yml\` and \`.github/workflows/release.yml\` — browser cache keys and install paths (search for the old version string)
          - \`crates/playwright/tests/playwright_version_test.rs\` — \`PLAYWRIGHT_VERSION\` assertion
          - \`crates/playwright/examples/*\` — example comments referencing the version

          See \`.claude/skills/release-process/SKILL.md\` and the **release** sub-agent for the full release flow.

          ## Things to validate

          - Browser binaries: \`cargo run --bin playwright-rs --features cli -- install\` succeeds on Linux/macOS/Windows
          - Protocol changes: review the [v${UPSTREAM} release notes](https://github.com/microsoft/playwright/releases/tag/v${UPSTREAM}) for breaking RPC or initializer-shape changes
          - Platform support: minor releases sometimes drop OS support (e.g. macOS 14 WebKit was removed in 1.59) — document under \`### Breaking Changes\` if present
          - Test suite: full run on all three platforms before tagging

          ## Tracking

          - Auto-created weekly by [.github/workflows/upstream-playwright-check.yml](.github/workflows/upstream-playwright-check.yml).
          - Closes automatically when the bump commit lands referencing this issue (\`closes #<n>\`).
          - A new issue will open the next time upstream releases a newer version.
          EOF

          gh issue create \
            --label upstream-playwright-bump \
            --title "${title}" \
            --body-file /tmp/issue-body.md

          echo "Opened tracking issue for ${UPSTREAM}."

  check-driver-sources:
    name: Probe driver-assembly download URLs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Resolve npm + Node URLs for every supported platform
        run: |
          set -euo pipefail
          pw=$(grep -E 'const PLAYWRIGHT_VERSION:' crates/playwright/build.rs | sed -E 's/.*"([^"]+)".*/\1/')
          node=$(grep -E 'const NODE_VERSION:' crates/playwright/src/build_support/driver_urls.rs | sed -E 's/.*"([^"]+)".*/\1/')
          if [ -z "$pw" ] || [ -z "$node" ]; then
            echo "::error::could not read PLAYWRIGHT_VERSION or NODE_VERSION from source"
            exit 1
          fi
          echo "Probing driver sources for playwright-core $pw + Node $node"

          # URL scheme mirrors src/build_support/driver_urls.rs (unit-tested
          # there); this probe checks the artifacts still exist upstream.
          urls=(
            "https://registry.npmjs.org/playwright-core/-/playwright-core-$pw.tgz"
            "https://nodejs.org/dist/v$node/node-v$node-darwin-x64.tar.gz"
            "https://nodejs.org/dist/v$node/node-v$node-darwin-arm64.tar.gz"
            "https://nodejs.org/dist/v$node/node-v$node-linux-x64.tar.gz"
            "https://nodejs.org/dist/v$node/node-v$node-linux-arm64.tar.gz"
            "https://nodejs.org/dist/v$node/node-v$node-win-x64.zip"
            "https://nodejs.org/dist/v$node/node-v$node-win-arm64.zip"
          )
          failed=0
          for url in "${urls[@]}"; do
            code=$(curl -sI -o /dev/null -w '%{http_code}' --max-time 30 --retry 2 "$url" || echo 000)
            if [ "$code" = "200" ]; then
              echo "ok   $code  $url"
            else
              echo "::error::driver source unreachable ($code): $url"
              failed=1
            fi
          done
          exit "$failed"
