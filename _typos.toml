# typos configuration
# Docs: https://github.com/crate-ci/typos

[files]
extend-exclude = [
    # cargo-vet files contain crate names that look like typos (e.g., flate2)
    "supply-chain/",
]

[default]
# Hex strings that look like git SHA prefixes (7-40 chars) frequently
# trip typos with bogus "abd → and" style suggestions. Linking to
# commits in markdown is routine, so ignore any standalone hex run of
# that length.
extend-ignore-re = [
    "\\b[0-9a-f]{7,40}\\b",
]
